<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Lëtzebuergesch A1.1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══ DASHBOARD ════════════════════════════════════════════════════════════ -->
  <div id="view-dashboard" class="view active">
    <header>
      <div class="app-title">Lëtzebuergesch</div>
      <div class="app-sub">A1.1</div>
    </header>

    <div class="dash">
      <div class="dash-top">
        <div class="dash-stat">
          <div class="dash-stat-val" id="dash-streak">🔥 0 jour</div>
          <div class="dash-stat-lbl">Série</div>
        </div>
        <div class="dash-stat">
          <div class="dash-stat-val" id="dash-global">0%</div>
          <div class="dash-stat-lbl">Progression</div>
        </div>
      </div>

      <div class="dash-bar"><div id="dash-global-fill"></div></div>

      <div class="dash-grid">
        <div class="dash-mini">
          <span id="dash-mastered">0 / 0</span>
          <label>Questions maîtrisées</label>
        </div>
        <div class="dash-mini">
          <span id="dash-lessons">0 / 0</span>
          <label>Leçons maîtrisées</label>
        </div>
      </div>

      <div class="dash-review" id="dash-review">À revoir : 0 question</div>

      <button class="dash-btn primary" onclick="goLessons()">Leçons</button>
      <button class="dash-btn" onclick="openReviewSetup()">Réviser</button>
      <button class="dash-btn" onclick="startSession('exam')">Examen · 50 questions</button>
      <button class="dash-btn" onclick="startSession('errors')">Erreurs fréquentes</button>

      <button class="dash-reset" onclick="confirmResetAll()">Réinitialiser toute la progression</button>

      <div class="dash-auth" id="dash-auth"></div>
    </div>
  </div>

  <!-- ══ LISTE DES LEÇONS ═════════════════════════════════════════════════════ -->
  <div id="view-lessons" class="view">
    <div class="lecon-header">
      <button class="back-btn" onclick="goDashboard()">← Accueil</button>
      <div class="lecon-header-info">
        <span class="lecon-num">LEÇONS</span>
        <span class="lecon-titre">Choisis une leçon</span>
      </div>
    </div>
    <div id="lecon-list" class="lecon-list"></div>
  </div>

  <!-- ══ LEÇON ════════════════════════════════════════════════════════════════ -->
  <div id="view-lecon" class="view">

    <div class="lecon-header" id="lecon-header">
      <button class="back-btn" onclick="goLessons()">← Leçons</button>
      <div class="lecon-header-info">
        <span class="lecon-num" id="lecon-num"></span>
        <span class="lecon-titre" id="lecon-titre"></span>
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="cours">Cours</button>
      <button class="tab-btn" data-tab="flashcards">Cartes</button>
      <button class="tab-btn" data-tab="quiz">Quiz</button>
      <button class="tab-btn" data-tab="trous">À trou</button>
      <button class="tab-btn" data-tab="ecriture">Écrire</button>
    </div>

    <!-- COURS -->
    <div id="tab-cours" class="tab active">
      <div id="cours-content" class="cours-content"></div>
    </div>

    <!-- FLASHCARDS -->
    <div id="tab-flashcards" class="tab">
      <div class="top-row">
        <div class="progress-wrap">
          <span id="fc-progress-text"></span>
          <div class="progress-bar"><div id="fc-progress-fill"></div></div>
        </div>
        <button class="dir-btn" id="fc-dir-btn" onclick="toggleFcDir()">🇫🇷→🇱🇺</button>
      </div>

      <div id="card" class="card">
        <div class="card-inner">
          <div class="card-front">
            <div class="card-label" id="fc-front-label"></div>
            <div class="card-word"  id="fc-front-word"></div>
            <div class="card-hint">appuyer pour retourner</div>
          </div>
          <div class="card-back">
            <div class="card-label" id="fc-back-label"></div>
            <div class="card-translation" id="fc-back-word"></div>
            <div class="card-note" id="fc-note"></div>
          </div>
        </div>
      </div>

      <div class="card-nav">
        <button id="btn-prev" onclick="prevCard()">←</button>
        <button id="btn-shuffle" onclick="shuffleCards()">⇄</button>
        <button id="btn-next" onclick="nextCard()">→</button>
      </div>
    </div>

    <!-- QUIZ -->
    <div id="tab-quiz" class="tab">
      <div class="progress-wrap" style="margin-bottom:.9rem">
        <span id="quiz-progress-text"></span>
        <div class="progress-bar"><div id="quiz-progress-fill"></div></div>
      </div>
      <div class="question-card" id="quiz-question-wrap">
        <div class="level-dots" id="quiz-level"></div>
        <div class="question-label" id="quiz-label"></div>
        <div class="question-word"  id="quiz-word"></div>
      </div>
      <div id="quiz-choices" class="choices"></div>
      <div id="quiz-result" class="result-card hidden">
        <div id="quiz-score"></div>
        <button onclick="startQuiz()">Recommencer</button>
      </div>
    </div>

    <!-- À TROU -->
    <div id="tab-trous" class="tab">
      <div class="progress-wrap" style="margin-bottom:.9rem">
        <span id="trou-progress-text"></span>
        <div class="progress-bar"><div id="trou-progress-fill"></div></div>
      </div>
      <div class="question-card" id="trou-card">
        <div class="level-dots" id="trou-level"></div>
        <div class="trou-fr"       id="trou-fr"></div>
        <div class="trou-sentence" id="trou-sentence"></div>
        <div class="trou-note hidden" id="trou-note"></div>
      </div>
      <div id="trou-choices" class="choices" style="margin-top:.9rem"></div>
      <div id="trou-result" class="result-card hidden">
        <div id="trou-score"></div>
        <button onclick="startTrous()">Recommencer</button>
      </div>
    </div>

    <!-- ÉCRITURE -->
    <div id="tab-ecriture" class="tab">
      <div class="top-row">
        <div class="progress-wrap">
          <span id="ecr-progress-text"></span>
          <div class="progress-bar"><div id="ecr-progress-fill"></div></div>
        </div>
        <button class="dir-btn" id="ecr-dir-btn" onclick="toggleEcritureDir()">🇫🇷→🇱🇺</button>
      </div>

      <div class="question-card hidden" id="ecr-card">
        <div class="level-dots" id="ecr-level"></div>
        <div class="question-label" id="ecr-dir-label">Écrivez en luxembourgeois</div>
        <div class="question-word" id="ecr-question"></div>
      </div>

      <div class="ecr-input-wrap hidden">
        <textarea id="ecr-input" class="ecr-input"
          placeholder="Tapez votre réponse…"
          rows="2"
          autocomplete="off" autocorrect="off"
          autocapitalize="none" spellcheck="false"></textarea>
        <button class="ecr-btn-validate" id="ecr-btn" onclick="validateEcriture()">Valider ✓</button>
      </div>

      <div id="ecr-feedback" class="ecr-feedback hidden"></div>

      <div id="ecr-result" class="result-card hidden">
        <div id="ecr-score"></div>
        <button onclick="startEcriture()">Recommencer</button>
      </div>
    </div>

  </div><!-- /view-lecon -->

  <!-- ══ CONFIGURATION DE RÉVISION ════════════════════════════════════════════ -->
  <div id="view-review-setup" class="view">
    <div class="lecon-header">
      <button class="back-btn" onclick="goDashboard()">← Accueil</button>
      <div class="lecon-header-info">
        <span class="lecon-num">RÉVISER</span>
        <span class="lecon-titre">Configure ta révision</span>
      </div>
    </div>

    <div class="rs">
      <div class="rs-block">
        <div class="rs-titre">Leçons</div>
        <button class="rs-all" onclick="toggleAllChecks('rs-lecons')">Tout cocher / décocher</button>
        <div class="rs-checks" id="rs-lecons"></div>
      </div>

      <div class="rs-block">
        <div class="rs-titre">Types d'exercice</div>
        <div class="rs-checks" id="rs-types">
          <label class="rs-check"><input type="checkbox" value="quiz" checked> Quiz</label>
          <label class="rs-check"><input type="checkbox" value="trous" checked> À trou</label>
          <label class="rs-check"><input type="checkbox" value="ecriture" checked> Écriture</label>
        </div>
      </div>

      <div class="rs-block">
        <div class="rs-titre">Nombre de questions</div>
        <input type="number" id="rs-count" class="rs-count" value="20" min="1" max="200">
      </div>

      <div class="rs-block">
        <div class="rs-titre">Focus</div>
        <div class="rs-checks">
          <label class="rs-check"><input type="radio" name="rs-focus" value="aleatoire" checked> Aléatoire</label>
          <label class="rs-check"><input type="radio" name="rs-focus" value="connu"> Déjà connu</label>
          <label class="rs-check"><input type="radio" name="rs-focus" value="erreurs"> Erreurs fréquentes</label>
        </div>
      </div>

      <button class="dash-btn primary" onclick="startConfiguredReview()">Commencer la révision</button>
    </div>
  </div>

  <!-- ══ SESSION (révision / examen / erreurs) ════════════════════════════════ -->
  <div id="view-session" class="view">
    <div class="lecon-header">
      <button class="back-btn" onclick="goDashboard()">← Accueil</button>
      <div class="lecon-header-info">
        <span class="lecon-num" id="session-num"></span>
        <span class="lecon-titre" id="session-titre"></span>
      </div>
    </div>

    <div class="session-body">
      <div class="progress-wrap" style="margin-bottom:.9rem">
        <span id="session-progress-text"></span>
        <div class="progress-bar"><div id="session-progress-fill"></div></div>
      </div>

      <div class="question-card" id="session-q">
        <div class="level-dots" id="session-level"></div>
        <div class="question-label" id="session-label"></div>
        <div class="question-word" id="session-word"></div>
        <div class="trou-sentence hidden" id="session-sentence"></div>
      </div>

      <div id="session-choices" class="choices hidden" style="margin-top:.9rem"></div>

      <div class="ecr-input-wrap hidden" id="session-input-wrap">
        <textarea id="session-input" class="ecr-input"
          placeholder="Tapez votre réponse…"
          rows="2"
          autocomplete="off" autocorrect="off"
          autocapitalize="none" spellcheck="false"></textarea>
        <button class="ecr-btn-validate" id="session-input-btn" onclick="validateSessionInput()">Valider ✓</button>
      </div>

      <div id="session-feedback" class="ecr-feedback hidden"></div>

      <div id="session-result" class="result-card hidden">
        <div id="session-score"></div>
        <button onclick="goDashboard()">Terminer</button>
      </div>
    </div>
  </div><!-- /view-session -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="progress.js"></script>
  <script src="cloud.js"></script>
  <script src="app.js"></script>
</body>
</html>
